apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:
      - job_name: 'node-exporter'
        static_configs:
          - targets: ['46.225.149.114:9100']

      - job_name: 'cadvisor'
        static_configs:
          - targets: ['46.225.149.114:8080']

      - job_name: 'k3s-node'
        static_configs:
          - targets: ['178.105.73.106:9100']
