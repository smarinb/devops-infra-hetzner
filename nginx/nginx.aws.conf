events {}
http {
    server {
        listen 80;
        server_name _;

        location /api/ {
            proxy_pass http://api:5000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /health {
            proxy_pass http://api:5000/health;
        }

        location / {
            root /var/www/portfolio;
            index index.html;
            try_files $uri $uri/ =404;
        }
    }
}
