events {}
http {
    server {
        listen 80;
        server_name sergiomarin.dev www.sergiomarin.dev;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name sergiomarin.dev www.sergiomarin.dev;

        ssl_certificate /etc/letsencrypt/live/sergiomarin.dev/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/sergiomarin.dev/privkey.pem;

        location /api/ {
            proxy_pass http://api:5000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }
}
